version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: interview-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      DEBUG: "false"
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      QWEN_MODEL: ${QWEN_MODEL:-qwen-plus}
      HUNYUAN_API_KEY: ${HUNYUAN_API_KEY:-}
      HUNYUAN_BASE_URL: ${HUNYUAN_BASE_URL:-https://api.hunyuan.cloud.tencent.com/v1}
      HUNYUAN_MODEL: ${HUNYUAN_MODEL:-hunyuan-lite}
    ports:
      - "5000:5000"

  web:
    build:
      context: ./web-frontend
    container_name: interview-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
