<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>面试模拟系统（Web）</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <div class="topbar">
          <h1>面试模拟系统（Web）</h1>
          <a class="link-btn" href="./admin.html">题库管理入口</a>
        </div>
        <p class="subtitle">选择岗位后自动加载固定题目，完成答题后获取评分与改进建议</p>
        <div class="row">
          <label for="role-select">岗位</label>
          <select id="role-select"></select>
        </div>
        <div id="status" class="status"></div>
      </section>

      <section id="qa-card" class="card hidden">
        <h2>面试回答</h2>
        <form id="qa-form"></form>
        <button id="submit-btn" class="primary">提交并评分</button>
      </section>

      <section id="result-card" class="card hidden">
        <h2>评分结果</h2>
        <div id="summary" class="summary"></div>
        <div id="result-list" class="result-list"></div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
